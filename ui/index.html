<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalcPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Display Area -->
    <div class="display-area">
      <div class="display-header">
        <button class="icon-btn" id="btn-memory-indicator" aria-label="Memory indicator" title="Memory" style="display:none">M</button>
        <button class="icon-btn" id="btn-history-toggle" aria-label="Toggle history" title="History">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button class="icon-btn" id="btn-sci-toggle" aria-label="Toggle scientific mode" title="Scientific">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16"/><path d="M5 12h14"/><path d="M12 2v20"/></svg>
        </button>
      </div>
      <div class="expression" id="expression">&nbsp;</div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Scientific Panel (hidden by default) -->
    <div class="sci-panel" id="sci-panel" style="display:none">
      <div class="sci-row">
        <button class="btn btn-sci" data-action="sin(">sin</button>
        <button class="btn btn-sci" data-action="cos(">cos</button>
        <button class="btn btn-sci" data-action="tan(">tan</button>
        <button class="btn btn-sci" data-action="log(">log</button>
        <button class="btn btn-sci" data-action="ln(">ln</button>
        <button class="btn btn-sci" data-action="sqrt(">√</button>
        <button class="btn btn-sci" data-action="^2">x²</button>
        <button class="btn btn-sci" data-action="^">xⁿ</button>
      </div>
      <div class="sci-row">
        <button class="btn btn-sci" data-action="pi">π</button>
        <button class="btn btn-sci" data-action="e">e</button>
        <button class="btn btn-sci" data-action="(">(</button>
        <button class="btn btn-sci" data-action=")">)</button>
        <button class="btn btn-sci" data-action="cbrt(">∛</button>
        <button class="btn btn-sci" data-action="pow(">xʸ</button>
        <button class="btn btn-sci" id="btn-angle-toggle" data-action="angleUnit">DEG</button>
      </div>
    </div>

    <!-- Memory Row -->
    <div class="memory-row">
      <button class="btn btn-memory" data-action="mc">MC</button>
      <button class="btn btn-memory" data-action="mr">MR</button>
      <button class="btn btn-memory" data-action="ms">MS</button>
      <button class="btn btn-memory" data-action="m+">M+</button>
      <button class="btn btn-memory" data-action="m-">M-</button>
    </div>

    <!-- Standard Buttons -->
    <div class="button-grid" id="button-grid">
      <button class="btn btn-clear" data-action="ac">AC</button>
      <button class="btn btn-clear" data-action="backspace">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
      <button class="btn btn-clear" data-action="%">%</button>
      <button class="btn btn-op" data-action="÷">÷</button>

      <button class="btn btn-num" data-action="7">7</button>
      <button class="btn btn-num" data-action="8">8</button>
      <button class="btn btn-num" data-action="9">9</button>
      <button class="btn btn-op" data-action="×">×</button>

      <button class="btn btn-num" data-action="4">4</button>
      <button class="btn btn-num" data-action="5">5</button>
      <button class="btn btn-num" data-action="6">6</button>
      <button class="btn btn-op" data-action="-">−</button>

      <button class="btn btn-num" data-action="1">1</button>
      <button class="btn btn-num" data-action="2">2</button>
      <button class="btn btn-num" data-action="3">3</button>
      <button class="btn btn-op" data-action="+">+</button>

      <button class="btn btn-num" data-action="negate">±</button>
      <button class="btn btn-num" data-action="0">0</button>
      <button class="btn btn-num" data-action=".">.</button>
      <button class="btn btn-eq" data-action="=">=</button>
    </div>
  </div>

  <!-- History Panel (slide-in) -->
  <div class="history-overlay" id="history-overlay" style="display:none"></div>
  <div class="history-panel" id="history-panel" style="display:none">
    <div class="history-header">
      <h2>History</h2>
      <button class="icon-btn" id="btn-history-close" aria-label="Close history">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty">No calculations yet</div>
    </div>
    <button class="btn btn-clear history-clear" id="btn-history-clear">Clear All</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
